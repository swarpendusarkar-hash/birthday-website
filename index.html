<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Puja ❤️</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  min-height:100%;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  background:#fff4f7;
}
.page{
  display:none;
  min-height:100svh;
  width:100%;
  position:relative;
  overflow:hidden;
}
.page.active{display:flex}

/* COVER */
#coverPage{
  align-items:center;
  justify-content:center;
  background:
    linear-gradient(rgba(35,0,15,.18),rgba(35,0,15,.30)),
    url("file_00000000792471fab9d1ed26ab406cbf.png") center/cover no-repeat;
}
.fingerprintButton{
  width:180px;
  height:180px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:rgba(255,185,45,.10);
  border:4px solid rgba(255,224,130,.92);
  box-shadow:0 0 18px #fff2a6,0 0 52px #ffc12d,0 0 105px #ff8b21;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:fingerPulse 1.7s ease-in-out infinite;
}
.fingerprintLines{
  width:68px;
  height:98px;
  border:4px solid #ffe47b;
  border-bottom-color:transparent;
  border-radius:48% 48% 42% 42%;
  transform:rotate(7deg);
  filter:drop-shadow(0 0 8px #ffc83d);
  box-shadow:
    0 0 0 8px transparent,
    0 0 0 12px #ffe47b,
    0 0 0 16px transparent,
    0 0 0 20px #ffe47b,
    0 0 0 24px transparent,
    0 0 0 28px #ffe47b;
}
@keyframes fingerPulse{
  0%,100%{transform:scale(.90);opacity:.58}
  50%{transform:scale(1.12);opacity:1}
}

/* GOLDEN ANIMATION */
#goldenPage{
  align-items:center;
  justify-content:center;
  background:#26030a;
}
.goldenBg{
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(55,5,8,.55),rgba(25,0,0,.78)),
    url("file_00000000792471fab9d1ed26ab406cbf.png") center/cover no-repeat;
  opacity:.75;
}
.goldRing{
  position:absolute;
  width:72vw;
  height:72vw;
  max-width:420px;
  max-height:420px;
  border-radius:50%;
  border:6px solid #ffe68c;
  box-shadow:0 0 20px #fff6be,0 0 60px #ffca42,0 0 125px #ff852d;
  animation:ringGrow 3s ease-in-out forwards;
}
.lightBurst{
  position:absolute;
  width:22px;
  height:22px;
  border-radius:50%;
  background:#fffbd8;
  box-shadow:0 0 30px 14px #fffbd8,0 0 95px 42px #ffd65c,0 0 190px 90px #ff962b;
  animation:burst 3s ease-out forwards;
}
.spark{
  position:absolute;
  width:7px;
  height:7px;
  border-radius:50%;
  background:#fff6b0;
  box-shadow:0 0 12px #fff,0 0 25px #ffd453;
  animation:sparkFly 2.8s ease-out forwards;
}
@keyframes ringGrow{
  0%{transform:scale(.05) rotate(0);opacity:0}
  18%{opacity:1}
  75%{transform:scale(1.25) rotate(270deg);opacity:1}
  100%{transform:scale(2.7) rotate(420deg);opacity:0}
}
@keyframes burst{
  0%{transform:scale(.2);opacity:0}
  18%{opacity:1}
  75%{transform:scale(12);opacity:1}
  100%{transform:scale(25);opacity:0}
}
@keyframes sparkFly{
  0%{transform:translate(0,0) scale(.2);opacity:0}
  12%{opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(1.8);opacity:0}
}

/* BIRTHDAY PAGE */
#birthdayPage{
  align-items:flex-end;
  justify-content:center;
  padding:0 16px 28px;
  background:#f5a0aa url("file_00000000f70471fb966e130dbdfbbd9d.png") center/cover no-repeat;
}
.birthdayActions{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}
.surpriseTitle{
  width:min(78vw,360px);
  padding:16px 12px;
  border-radius:50px;
  border:3px solid #fff;
  background:linear-gradient(135deg,#ff70a5,#ee1a72);
  color:#fff;
  text-align:center;
  font-size:clamp(20px,5vw,27px);
  font-weight:bold;
  box-shadow:0 8px 22px rgba(129,0,59,.42);
}
.scratchWrap{
  position:relative;
  width:min(88vw,440px);
  height:126px;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(143,0,68,.42);
  touch-action:none;
}
.dateCard{
  width:100%;
  height:100%;
  border:3px solid #fff;
  border-radius:30px;
  background:linear-gradient(135deg,#ff4e8c,#e7006b);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.dateCard b{font-size:clamp(25px,7vw,38px);letter-spacing:1px}
.dateCard span{margin-top:9px;font-size:13px;letter-spacing:4px;font-weight:bold}
#scratchCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  touch-action:none;
}
.scratchText{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:17px;
  font-weight:bold;
  letter-spacing:1px;
  pointer-events:none;
  text-shadow:0 2px 6px rgba(0,0,0,.35);
}

/* MEMORY */
#memoryPage{
  flex-direction:column;
  align-items:center;
  padding:42px 16px 70px;
  overflow-y:auto;
  background:linear-gradient(#fffaf7,#ffe7ef);
}
.memorySmall{
  color:#a75c69;
  letter-spacing:5px;
  font-size:14px;
  margin:4px 0 8px;
}
.memoryTitle{
  color:#934957;
  font-family:Georgia,serif;
  font-size:clamp(44px,12vw,68px);
  margin:0 0 28px;
  text-align:center;
}
.gallery{width:min(100%,560px)}
.photoCard{
  background:#fff;
  padding:13px 13px 20px;
  border-radius:18px;
  margin:0 auto 30px;
  box-shadow:0 14px 30px rgba(120,55,78,.18);
  opacity:0;
}
.photoCard.show{
  animation:photoEnter .8s ease forwards,softFloat 4.2s ease-in-out infinite;
}
.photoCard img{
  display:block;
  width:100%;
  max-height:680px;
  object-fit:cover;
  border-radius:10px;
}
.caption{
  color:#9d5361;
  text-align:center;
  font-family:Georgia,serif;
  font-size:24px;
  margin-top:14px;
}
@keyframes photoEnter{
  from{opacity:0;transform:translateY(45px) rotate(-2deg) scale(.96)}
  to{opacity:1;transform:translateY(0) rotate(0) scale(1)}
}
@keyframes softFloat{
  0%,100%{transform:translateY(0) rotate(-.5deg)}
  50%{transform:translateY(-7px) rotate(.5deg) scale(1.01)}
}

/* PETALS */
.petal,.confetti{
  position:fixed;
  top:-50px;
  pointer-events:none;
  z-index:9999;
  animation:petalFall linear forwards;
}
.petal{
  border-radius:75% 15% 75% 15%;
  box-shadow:0 2px 5px rgba(120,30,55,.18);
}
.confetti{border-radius:2px}
@keyframes petalFall{
  0%{transform:translate3d(0,-60px,0) rotate(0);opacity:0}
  8%{opacity:1}
  25%{transform:translate3d(calc(var(--drift) * .25),25vh,0) rotate(calc(var(--spin) * .25))}
  50%{transform:translate3d(calc(var(--drift) * -.25),52vh,0) rotate(calc(var(--spin) * .55))}
  75%{transform:translate3d(calc(var(--drift) * .55),78vh,0) rotate(calc(var(--spin) * .78))}
  100%{transform:translate3d(var(--drift),112vh,0) rotate(var(--spin));opacity:.15}
}
</style>
</head>

<body>

<section id="coverPage" class="page active">
  <button class="fingerprintButton" onclick="openGolden('birthdayPage')" aria-label="Open surprise">
    <div class="fingerprintLines"></div>
  </button>
</section>

<section id="goldenPage" class="page"></section>

<section id="birthdayPage" class="page">
  <div class="birthdayActions">
    <div class="surpriseTitle">Open Your Surprise 🎁</div>

    <div class="scratchWrap" id="scratchWrap">
      <div class="dateCard">
        <b>26 NOVEMBER 2026</b>
        <span>SCRATCH TO OPEN ✨</span>
      </div>
      <canvas id="scratchCanvas"></canvas>
      <div class="scratchText">SCRATCH HERE ✨</div>
    </div>
  </div>
</section>

<section id="memoryPage" class="page">
  <p class="memorySmall">OUR MEMORIES</p>
  <h1 class="memoryTitle">Forever Us</h1>

  <div class="gallery">
    <div class="photoCard"><img src="IMG-20260528-WA0006(1).jpg"><div class="caption">Beautiful Puja ❤️</div></div>
    <div class="photoCard"><img src="IMG-20260313-WA0046.jpg"><div class="caption">Our Sweet Memory ❤️</div></div>
    <div class="photoCard"><img src="IMG-20260618-WA0019.jpg"><div class="caption">My Favourite Smile 🌸</div></div>
    <div class="photoCard"><img src="IMG-20251021-WA0071.jpg"><div class="caption">Together Forever ❤️</div></div>
    <div class="photoCard"><img src="IMG-20260313-WA0053.jpg"><div class="caption">Happy Birthday Puja 🎂</div></div>
  </div>
</section>

<script>
let scratchDone=false;
let drawing=false;
let petalInterval=null;

const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");
const scratchWrap=document.getElementById("scratchWrap");
const scratchText=document.querySelector(".scratchText");

function showOnly(id){
  document.querySelectorAll(".page").forEach(page=>page.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

function openGolden(nextPage){
  showOnly("goldenPage");

  const golden=document.getElementById("goldenPage");
  golden.innerHTML='<div class="goldenBg"></div><div class="goldRing"></div><div class="lightBurst"></div>';

  for(let i=0;i<90;i++){
    const spark=document.createElement("div");
    spark.className="spark";

    const angle=Math.random()*Math.PI*2;
    const distance=100+Math.random()*430;

    spark.style.left="50%";
    spark.style.top="50%";
    spark.style.setProperty("--x",Math.cos(angle)*distance+"px");
    spark.style.setProperty("--y",Math.sin(angle)*distance+"px");
    spark.style.animationDelay=(Math.random()*.7)+"s";

    golden.appendChild(spark);
  }

  setTimeout(()=>{
    showOnly(nextPage);

    if(nextPage==="birthdayPage"){
      setupScratch();
    }

    if(nextPage==="memoryPage"){
      animatePhotos();
      startPetalRain();
    }
  },3000);
}

function setupScratch(){
  scratchDone=false;

  const rect=scratchWrap.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;

  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+"px";
  canvas.style.height=rect.height+"px";

  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.globalCompositeOperation="source-over";
  ctx.fillStyle="#b55b79";
  ctx.fillRect(0,0,rect.width,rect.height);

  ctx.fillStyle="rgba(255,255,255,.18)";
  for(let i=0;i<65;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*rect.width,Math.random()*rect.height,Math.random()*4+1,0,Math.PI*2);
    ctx.fill();
  }

  scratchText.style.display="flex";
  canvas.style.pointerEvents="auto";
}

function getPoint(e){
  const rect=canvas.getBoundingClientRect();
  return {x:e.clientX-rect.left,y:e.clientY-rect.top};
}

function scratch(e){
  if(!drawing || scratchDone)return;

  e.preventDefault();
  const p=getPoint(e);

  scratchText.style.display="none";

  ctx.globalCompositeOperation="destination-out";
  ctx.beginPath();
  ctx.arc(p.x,p.y,38,0,Math.PI*2);
  ctx.fill();

  const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let clear=0,total=0;

  for(let i=3;i<data.length;i+=80){
    total++;
    if(data[i]<20)clear++;
  }

  if(clear/total>.18){
    scratchDone=true;
    drawing=false;
    canvas.style.pointerEvents="none";

    setTimeout(()=>{
      openGolden("memoryPage");
    },250);
  }
}

canvas.addEventListener("pointerdown",e=>{
  drawing=true;
  canvas.setPointerCapture(e.pointerId);
  scratch(e);
});
canvas.addEventListener("pointermove",scratch);
canvas.addEventListener("pointerup",()=>drawing=false);
canvas.addEventListener("pointercancel",()=>drawing=false);

function animatePhotos(){
  document.querySelectorAll(".photoCard").forEach((card,index)=>{
    card.classList.remove("show");
    setTimeout(()=>{
      card.classList.add("show");
    },index*220);
  });
}

function makePetal(){
  const petalColors=["#ff9fbd","#ffd1df","#ffcf5c","#fff0a8","#f47fa7","#ffffff"];
  const confettiColors=["#ffcf5c","#ff9fbd","#ffd1df","#aee8d4","#ffffff"];

  const item=document.createElement("div");
  const isPetal=Math.random()<.72;

  item.className=isPetal?"petal":"confetti";
  item.style.left=(Math.random()*100)+"vw";
  item.style.background=isPetal
    ?petalColors[Math.floor(Math.random()*petalColors.length)]
    :confettiColors[Math.floor(Math.random()*confettiColors.length)];

  item.style.setProperty("--drift",(Math.random()*220-110)+"px");
  item.style.setProperty("--spin",(Math.random()*900-450)+"deg");

  const size=isPetal?(7+Math.random()*11):(5+Math.random()*6);
  item.style.width=size+"px";
  item.style.height=isPetal?(size*1.45)+"px":(size*1.5)+"px";
  item.style.animationDuration=(6+Math.random()*6)+"s";

  document.body.appendChild(item);
  setTimeout(()=>item.remove(),13000);
}

function startPetalRain(){
  if(petalInterval)clearInterval(petalInterval);

  for(let i=0;i<50;i++){
    setTimeout(makePetal,i*65);
  }

  petalInterval=setInterval(()=>{
    for(let i=0;i<4;i++){
      setTimeout(makePetal,i*180);
    }
  },1200);
}
</script>

</body>
</html>
