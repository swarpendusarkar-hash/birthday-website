<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Puja ❤️</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;min-height:100%;font-family:Arial,sans-serif;overflow-x:hidden}
body{background:#fff7f5}

/* সব page */
.page{
  display:none;
  min-height:100vh;
  width:100%;
  position:relative;
  overflow:hidden;
}
.page.active{display:flex}

/* 1. Fingerprint cover */
#coverPage{
  background-image:url("file_00000000792471fab9d1ed26ab406cbf.png");
  background-size:cover;
  background-position:center;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.coverTap{
  position:absolute;
  left:50%;
  top:62%;
  transform:translate(-50%,-50%);
  width:190px;
  height:190px;
  border-radius:50%;
  cursor:pointer;
}

.coverText{
  position:absolute;
  top:43%;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  text-align:center;
  color:#f6d47a;
  font-family:Georgia,serif;
  font-size:clamp(25px,7vw,42px);
  text-shadow:0 2px 8px #26060a;
  pointer-events:none;
}

/* Golden opening animation */
#goldenPage{
  background:#260a0b;
  align-items:center;
  justify-content:center;
}

.goldenBg{
  position:absolute;
  inset:0;
  background-image:url("file_00000000792471fab9d1ed26ab406cbf.png");
  background-size:cover;
  background-position:center;
  opacity:.35;
  filter:blur(2px);
}

.lightRing{
  position:relative;
  width:130px;
  height:130px;
  border-radius:50%;
  border:5px solid #ffd76a;
  box-shadow:
    0 0 20px #fff2a8,
    0 0 55px #ffcc3f,
    0 0 110px #ff9f1c;
  animation:ringOpen 2.2s ease-out forwards;
}

.lightRing:before,
.lightRing:after{
  content:"";
  position:absolute;
  inset:-35px;
  border-radius:50%;
  border:2px solid rgba(255,221,113,.75);
  animation:wave 1.5s ease-out infinite;
}

.lightRing:after{
  inset:-70px;
  animation-delay:.35s;
}

@keyframes ringOpen{
  0%{transform:scale(.2);opacity:0}
  35%{transform:scale(1);opacity:1}
  100%{transform:scale(8);opacity:0}
}

@keyframes wave{
  0%{transform:scale(.4);opacity:1}
  100%{transform:scale(1.5);opacity:0}
}

/* 2. Birthday page */
#birthdayPage{
  background-image:url("file_00000000f70471fb966e130dbdfbbd9d.png");
  background-size:cover;
  background-position:center;
  align-items:flex-end;
  justify-content:center;
  min-height:100vh;
}

.dateTap{
  position:absolute;
  left:50%;
  top:83%;
  transform:translate(-50%,-50%);
  width:min(76vw,420px);
  padding:16px 14px;
  text-align:center;
  cursor:pointer;
  border-radius:24px;
  background:rgba(239,35,110,.35);
  border:2px solid rgba(255,255,255,.95);
  box-shadow:0 8px 24px rgba(150,0,65,.35);
  color:white;
  animation:datePulse 2s ease-in-out infinite;
}

.dateSmall{
  font-size:11px;
  letter-spacing:4px;
  font-weight:bold;
  margin-bottom:6px;
  color:#fff;
}

.birthdayDate{
  font-family:Georgia,serif;
  font-size:clamp(27px,7vw,40px);
  font-weight:bold;
  line-height:1.05;
  color:#fff8d5;
  text-shadow:0 2px 7px #b30045;
}

@keyframes datePulse{
  0%,100%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-50%) scale(1.04)}
}

/* 3. Memory page */
#memoryPage{
  display:none;
  min-height:100vh;
  flex-direction:column;
  align-items:center;
  background:linear-gradient(#fffaf6,#ffe8ee);
  padding:42px 18px 80px;
}

#memoryPage.active{display:flex}

.memoryTop{
  text-align:center;
  margin-bottom:28px;
  position:relative;
  z-index:2;
}

.memoryTop p{
  margin:0 0 8px;
  letter-spacing:5px;
  font-size:13px;
  color:#b5808c;
  font-weight:bold;
}

.memoryTop h1{
  margin:0;
  color:#914f5d;
  font-family:Georgia,serif;
  font-size:clamp(44px,12vw,70px);
}

.photoCard{
  width:min(92vw,620px);
  background:#fff;
  padding:18px 18px 22px;
  border-radius:18px;
  box-shadow:0 14px 30px rgba(142,69,88,.20);
  margin:0 0 32px;
  position:relative;
  z-index:2;
}

.photoCard img{
  width:100%;
  height:auto;
  max-height:680px;
  object-fit:cover;
  border-radius:9px;
  display:block;
}

.photoCard p{
  text-align:center;
  margin:16px 0 0;
  color:#a15b6c;
  font-family:Georgia,serif;
  font-size:28px;
}

/* Petals + confetti */
.petal,.confetti{
  position:fixed;
  top:-40px;
  pointer-events:none;
  z-index:99;
  opacity:.85;
  animation:fallDown linear forwards;
}

.petal{
  width:15px;
  height:10px;
  border-radius:85% 0 85% 0;
}

.confetti{
  width:7px;
  height:12px;
  border-radius:2px;
}

@keyframes fallDown{
  0%{
    transform:translateY(-50px) translateX(0) rotate(0deg);
    opacity:0;
  }
  8%{opacity:.85}
  45%{
    transform:translateY(48vh) translateX(35px) rotate(220deg);
  }
  75%{
    transform:translateY(78vh) translateX(-28px) rotate(390deg);
  }
  100%{
    transform:translateY(112vh) translateX(25px) rotate(620deg);
    opacity:.15;
  }
}
</style>
</head>

<body>

<section id="coverPage" class="page active" onclick="startGolden()">
  <div class="coverText">Tap to Reveal</div>
  <div class="coverTap"></div>
</section>

<section id="goldenPage" class="page">
  <div class="goldenBg"></div>
  <div class="lightRing"></div>
</section>

<section id="birthdayPage" class="page">
  <div class="dateTap" onclick="openMemory()">
    <div class="dateSmall">A SPECIAL DAY</div>
    <div class="birthdayDate">26 NOVEMBER<br>2026</div>
  </div>
</section>

<section id="memoryPage" class="page">
  <div class="memoryTop">
    <p>OUR MEMORIES</p>
    <h1>Forever Us</h1>
  </div>

  <div class="photoCard">
    <img src="IMG-20260528-WA0006(1).jpg" alt="Puja">
    <p>Beautiful Puja ❤️</p>
  </div>

  <div class="photoCard">
    <img src="IMG-20260313-WA0046.jpg" alt="Puja">
    <p>Our Lovely Moment ❤️</p>
  </div>

  <div class="photoCard">
    <img src="IMG-20260618-WA0019.jpg" alt="Puja">
    <p>My Favourite Smile 🌸</p>
  </div>

  <div class="photoCard">
    <img src="IMG-20251021-WA0071.jpg" alt="Puja">
    <p>Always Together ❤️</p>
  </div>

  <div class="photoCard">
    <img src="IMG-20260313-WA0053.jpg" alt="Puja">
    <p>Forever My Puja ❤️</p>
  </div>
</section>

<script>
function showPage(pageId){
  document.querySelectorAll(".page").forEach(function(page){
    page.classList.remove("active");
  });
  document.getElementById(pageId).classList.add("active");
}

function startGolden(){
  showPage("goldenPage");

  setTimeout(function(){
    showPage("birthdayPage");
  },2200);
}

function openMemory(){
  showPage("memoryPage");
  createPetalsAndConfetti();
}

function createPetalsAndConfetti(){
  const petalColors=["#f7b6c8","#ffd2dc","#f3c85c","#fff0b8","#e98ca9"];
  const confettiColors=["#f6c94d","#f2a3b7","#b56a76","#f9df9a","#ffffff"];

  for(let i=0;i<85;i++){
    const item=document.createElement("div");
    const isPetal=Math.random()>0.35;

    item.className=isPetal ? "petal" : "confetti";
    item.style.left=(Math.random()*100)+"vw";

    item.style.background=isPetal
      ? petalColors[Math.floor(Math.random()*petalColors.length)]
      : confettiColors[Math.floor(Math.random()*confettiColors.length)];

    item.style.animationDuration=(6+Math.random()*6)+"s";
    item.style.animationDelay=(Math.random()*3)+"s";

    if(isPetal){
      const size=8+Math.random()*9;
      item.style.width=size+"px";
      item.style.height=(size*.65)+"px";
    }else{
      const size=5+Math.random()*5;
      item.style.width=size+"px";
      item.style.height=(size*1.7)+"px";
    }

    document.body.appendChild(item);

    setTimeout(function(){
      item.remove();
    },15000);
  }
}
</script>

</body>
</html>
