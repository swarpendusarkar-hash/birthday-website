<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Puja ❤️</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  width:100%;
  min-height:100%;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  background:#fff4f7;
}

.page{
  display:none;
  position:relative;
  width:100%;
  min-height:100vh;
  min-height:100svh;
  overflow:hidden;
}

.page.active{
  display:flex;
}

/* প্রথম page: শুধু তোমার cover photo */
#coverPage{
  align-items:center;
  justify-content:center;
  background-color:#5c1420;
  background-image:url("file_00000000792471fab9d1ed26ab406cbf.png");
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
}

/* ছবির fingerprint-এর উপর invisible tap area */
.fingerprintTap{
  position:absolute;
  left:50%;
  top:65%;
  transform:translate(-50%,-50%);
  width:220px;
  height:240px;
  border:0;
  background:transparent;
  cursor:pointer;
  z-index:10;
}

/* Fingerprint tap-এর পর 4 second animation */
#animationPage{
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,#b84550 0%,#4a0712 48%,#160004 100%);
}

.core{
  position:absolute;
  width:34px;
  height:34px;
  border-radius:50%;
  background:#fff7bd;
  box-shadow:
    0 0 30px 18px #fff7bd,
    0 0 100px 55px #ffd04b,
    0 0 190px 100px #ff8d31;
  animation:blast 4s ease-in-out forwards;
}

.ring{
  position:absolute;
  width:90px;
  height:90px;
  border-radius:50%;
  border:4px solid #ffe791;
  box-shadow:0 0 25px #fff5c5,0 0 60px #ffc733;
  animation:ringBlast 4s ease-out forwards;
}

.r2{animation-delay:.45s}
.r3{animation-delay:.9s}
.r4{animation-delay:1.35s}

.spark{
  position:absolute;
  width:7px;
  height:7px;
  border-radius:50%;
  background:#fff6ae;
  box-shadow:0 0 10px #fff,0 0 22px #ffd34f;
  animation:sparkMove 3.5s ease-out forwards;
}

@keyframes blast{
  0%,20%{transform:scale(.15);opacity:0}
  42%{transform:scale(1);opacity:1}
  82%{transform:scale(12);opacity:1}
  100%{transform:scale(20);opacity:0}
}

@keyframes ringBlast{
  0%{transform:scale(.1);opacity:0}
  12%{opacity:1}
  100%{transform:scale(16);opacity:0}
}

@keyframes sparkMove{
  0%{transform:translate(0,0) scale(.2);opacity:0}
  10%{opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(1.6);opacity:0}
}

/* Birthday page */
#birthdayPage{
  align-items:flex-end;
  justify-content:center;
  padding:0 16px 34px;
  background-color:#f78a9e;
  background-image:url("file_00000000f70471fb966e130dbdfbbd9d.png");
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
}

.scratchWrap{
  position:relative;
  width:min(88vw,440px);
  height:130px;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(120,0,60,.42);
  z-index:20;
  touch-action:none;
}

.dateCard{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px solid white;
  border-radius:30px;
  background:linear-gradient(135deg,#ff4f91,#e6006a);
  color:white;
  text-align:center;
}

.dateCard b{
  font-size:clamp(26px,7vw,38px);
  letter-spacing:1px;
}

#scratchCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:2;
  touch-action:none;
}

.scratchText{
  position:absolute;
  inset:0;
  z-index:3;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
  font-weight:bold;
  letter-spacing:1px;
  pointer-events:none;
  text-shadow:0 2px 6px rgba(0,0,0,.35);
}

/* Memory page */
#memoryPage{
  flex-direction:column;
  align-items:center;
  padding:40px 16px 70px;
  overflow-y:auto;
  background:linear-gradient(#fffaf7,#ffe4ee);
}

.small{
  color:#a75c69;
  letter-spacing:4px;
  font-size:13px;
  margin:0;
}

.title{
  color:#934957;
  font-family:Georgia,serif;
  font-size:clamp(45px,12vw,64px);
  margin:8px 0 30px;
  text-align:center;
}

.gallery{
  width:min(100%,560px);
}

.card{
  opacity:0;
  background:#fff;
  padding:12px 12px 20px;
  border-radius:18px;
  margin-bottom:28px;
  box-shadow:0 14px 30px rgba(120,55,78,.18);
}

.card.show{
  animation:photoIn .8s ease forwards,photoFloat 4s ease-in-out infinite;
}

.card img{
  width:100%;
  display:block;
  border-radius:10px;
  max-height:680px;
  object-fit:cover;
}

.caption{
  text-align:center;
  color:#9d5361;
  font-size:22px;
  font-family:Georgia,serif;
  margin-top:12px;
}

@keyframes photoIn{
  from{opacity:0;transform:translateY(45px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

@keyframes photoFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}
}

/* Petals */
.petal{
  position:fixed;
  top:-45px;
  z-index:9999;
  pointer-events:none;
  border-radius:75% 15% 75% 15%;
  animation:fall linear forwards;
}

@keyframes fall{
  0%{transform:translate(0,-40px) rotate(0);opacity:0}
  10%{opacity:1}
  100%{transform:translate(var(--move),110vh) rotate(var(--spin));opacity:.15}
}
</style>
</head>

<body>

<section id="coverPage" class="page active">
  <button class="fingerprintTap" id="fingerprintTap" aria-label="Open surprise"></button>
</section>

<section id="animationPage" class="page"></section>

<section id="birthdayPage" class="page">
  <div class="scratchWrap" id="scratchWrap">
    <div class="dateCard">
      <b>26 NOVEMBER 2026</b>
    </div>
    <canvas id="scratchCanvas"></canvas>
    <div class="scratchText">SCRATCH HERE ✨</div>
  </div>
</section>

<section id="memoryPage" class="page">
  <p class="small">OUR MEMORIES</p>
  <h1 class="title">Forever Us</h1>

  <div class="gallery">
    <div class="card"><img src="IMG-20260528-WA0006(1).jpg" alt="Puja"><div class="caption">Beautiful Puja ❤️</div></div>
    <div class="card"><img src="IMG-20260313-WA0046.jpg" alt="Puja"><div class="caption">Our Sweet Memory ❤️</div></div>
    <div class="card"><img src="IMG-20260618-WA0019.jpg" alt="Puja"><div class="caption">My Favourite Smile 🌸</div></div>
    <div class="card"><img src="IMG-20251021-WA0071.jpg" alt="Puja"><div class="caption">Together Forever ❤️</div></div>
    <div class="card"><img src="IMG-20260313-WA0053.jpg" alt="Puja"><div class="caption">Happy Birthday Puja 🎂</div></div>
  </div>
</section>

<script>
let scratchCount = 0;
let drawing = false;
let opened = false;
let petalTimer;

const canvas = document.getElementById("scratchCanvas");
const ctx = canvas.getContext("2d");
const scratchWrap = document.getElementById("scratchWrap");
const scratchText = document.querySelector(".scratchText");

function showPage(id){
  document.querySelectorAll(".page").forEach(page => page.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

document.getElementById("fingerprintTap").addEventListener("click", openAnimation);

function openAnimation(){
  showPage("animationPage");

  const animationPage = document.getElementById("animationPage");
  animationPage.innerHTML = `
    <div class="core"></div>
    <div class="ring"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="ring r4"></div>
  `;

  for(let i=0;i<90;i++){
    const spark = document.createElement("div");
    spark.className = "spark";

    const angle = Math.random() * Math.PI * 2;
    const distance = 80 + Math.random() * 480;

    spark.style.left = "50%";
    spark.style.top = "50%";
    spark.style.setProperty("--x", Math.cos(angle) * distance + "px");
    spark.style.setProperty("--y", Math.sin(angle) * distance + "px");
    spark.style.animationDelay = (Math.random() * 1.2) + "s";

    animationPage.appendChild(spark);
  }

  setTimeout(() => {
    showPage("birthdayPage");
    setupScratch();
    startPetals();
  }, 4000);
}

function setupScratch(){
  opened = false;
  scratchCount = 0;

  const rect = scratchWrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);

  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = "#b55b79";
  ctx.fillRect(0,0,rect.width,rect.height);

  ctx.fillStyle = "rgba(255,255,255,.20)";
  for(let i=0;i<70;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*rect.width, Math.random()*rect.height, Math.random()*4+1, 0, Math.PI*2);
    ctx.fill();
  }

  scratchText.style.display = "flex";
  canvas.style.pointerEvents = "auto";
}

function scratchAt(event){
  if(!drawing || opened) return;

  event.preventDefault();
  scratchText.style.display = "none";

  const rect = canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;

  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath();
  ctx.arc(x,y,46,0,Math.PI*2);
  ctx.fill();

  scratchCount++;

  /* 6 বার আঙুল চালালেই memory page খুলবে */
  if(scratchCount >= 6){
    openMemories();
  }
}

canvas.addEventListener("pointerdown", event => {
  drawing = true;
  try{canvas.setPointerCapture(event.pointerId)}catch(e){}
  scratchAt(event);
});

canvas.addEventListener("pointermove", scratchAt);

canvas.addEventListener("pointerup", () => {
  drawing = false;
});

canvas.addEventListener("pointercancel", () => {
  drawing = false;
});

function openMemories(){
  if(opened) return;

  opened = true;
  drawing = false;
  canvas.style.pointerEvents = "none";

  for(let i=0;i<90;i++){
    setTimeout(makePetal, i*15);
  }

  setTimeout(() => {
    showPage("memoryPage");

    document.querySelectorAll(".card").forEach((card,index) => {
      setTimeout(() => card.classList.add("show"), index*350);
    });

    startPetals();
  }, 1300);
}

function makePetal(){
  const colors = ["#ff9fbd","#ffd1df","#ffcf5c","#fff0a8","#f47fa7","#ffffff"];

  const petal = document.createElement("div");
  const size = 7 + Math.random()*12;

  petal.className = "petal";
  petal.style.left = Math.random()*100 + "vw";
  petal.style.width = size + "px";
  petal.style.height = size*1.45 + "px";
  petal.style.background = colors[Math.floor(Math.random()*colors.length)];
  petal.style.setProperty("--move",(Math.random()*220-110)+"px");
  petal.style.setProperty("--spin",(Math.random()*900-450)+"deg");
  petal.style.animationDuration = (6+Math.random()*5)+"s";

  document.body.appendChild(petal);
  setTimeout(() => petal.remove(), 12000);
}

function startPetals(){
  clearInterval(petalTimer);

  for(let i=0;i<40;i++){
    setTimeout(makePetal,i*55);
  }

  petalTimer = setInterval(() => {
    for(let i=0;i<3;i++){
      setTimeout(makePetal,i*180);
    }
  },1200);
}
</script>

</body>
</html>
