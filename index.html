<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Puja</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #fff7f7;
      overflow-x: hidden;
    }

    .page {
      display: none;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .page.active { display: block; }

    /* BIRTHDAY PAGE */
    #birthdayPage {
      min-height: 100vh;
      background-image: url("file_000000001794720bbe1f6708d96e5b55.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      padding: 72vh 0 28px;
    }

    .scratch-wrap {
      width: min(88%, 420px);
      margin: 0 auto;
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(117, 18, 69, .35);
      touch-action: none;
    }

    .date-card {
      height: 140px;
      border-radius: 30px;
      background: linear-gradient(135deg, #ff5192, #e9006e);
      border: 3px solid white;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
    }

    .date-card b {
      font-size: clamp(26px, 7vw, 38px);
      letter-spacing: 1px;
    }

    .date-card span {
      margin-top: 10px;
      font-size: 15px;
      letter-spacing: 4px;
      font-weight: bold;
    }

    #scratchCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 30px;
      cursor: pointer;
    }

    .scratch-help {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 17px;
      letter-spacing: 1px;
      pointer-events: none;
      text-shadow: 0 2px 6px rgba(0,0,0,.4);
    }

    /* GOLDEN REVEAL */
    #goldenReveal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(75, 13, 38, .28);
      z-index: 20;
      overflow: hidden;
    }

    #goldenReveal.show { display: flex; }

    .gold-ring {
      width: 100px;
      height: 100px;
      border: 6px solid #ffd35b;
      border-radius: 50%;
      box-shadow:
        0 0 20px #fff1a0,
        0 0 60px #ffc400,
        0 0 130px #ffb000;
      animation: goldenOpen 1.8s ease-out forwards;
    }

    .gold-core {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff7c2;
      box-shadow: 0 0 30px 18px #ffe173, 0 0 90px 45px #ffb300;
      animation: coreFlash 1.8s ease-out forwards;
    }

    @keyframes goldenOpen {
      0% { transform: scale(.15) rotate(0deg); opacity: 0; }
      25% { opacity: 1; }
      100% { transform: scale(13) rotate(540deg); opacity: 0; }
    }

    @keyframes coreFlash {
      0% { transform: scale(.1); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: scale(22); opacity: 0; }
    }

    /* MEMORY PAGE */
    #memoryPage {
      min-height: 100vh;
      background: linear-gradient(180deg, #fff8f4, #ffe7ee);
      padding: 45px 18px 70px;
    }

    .memory-title {
      text-align: center;
      color: #9b4d5a;
      letter-spacing: 5px;
      font-size: 14px;
      margin: 10px 0 8px;
    }

    .memory-heading {
      text-align: center;
      color: #934957;
      font-family: Georgia, serif;
      font-size: clamp(42px, 12vw, 65px);
      margin: 0 0 30px;
    }

    .photo-card {
      width: min(100%, 520px);
      margin: 0 auto 28px;
      background: white;
      padding: 16px 16px 22px;
      border-radius: 18px;
      box-shadow: 0 14px 30px rgba(118, 55, 75, .18);
      animation: photoIn .8s ease both;
    }

    .photo-card:nth-of-type(2) { animation-delay: .15s; }
    .photo-card:nth-of-type(3) { animation-delay: .3s; }
    .photo-card:nth-of-type(4) { animation-delay: .45s; }
    .photo-card:nth-of-type(5) { animation-delay: .6s; }

    .photo-card img {
      width: 100%;
      display: block;
      border-radius: 10px;
      max-height: 680px;
      object-fit: cover;
    }

    .photo-caption {
      text-align: center;
      color: #9b4d5a;
      font-family: Georgia, serif;
      font-size: 25px;
      margin-top: 15px;
    }

    @keyframes photoIn {
      from { opacity: 0; transform: translateY(35px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* PETALS + CONFETTI */
    .petal, .confetti {
      position: fixed;
      top: -40px;
      z-index: 30;
      pointer-events: none;
      animation: fall linear forwards;
    }

    .petal {
      width: 13px;
      height: 20px;
      border-radius: 70% 20% 70% 20%;
      background: #ff9ab7;
      opacity: .85;
    }

    .confetti {
      width: 8px;
      height: 14px;
      background: #ffd35b;
      opacity: .9;
    }

    @keyframes fall {
      to {
        transform: translate(var(--drift), 115vh) rotate(720deg);
        opacity: .15;
      }
    }
  </style>
</head>

<body>

  <!-- BIRTHDAY PAGE -->
  <section id="birthdayPage" class="page active">
    <div class="scratch-wrap" id="scratchWrap">
      <div class="date-card">
        <b>26 NOVEMBER 2026</b>
        <span>TAP &amp; SCRATCH</span>
      </div>
      <canvas id="scratchCanvas"></canvas>
      <div class="scratch-help">SCRATCH HERE ✨</div>
    </div>
  </section>

  <!-- GOLDEN ANIMATION -->
  <div id="goldenReveal">
    <div class="gold-ring"></div>
    <div class="gold-core"></div>
  </div>

  <!-- MEMORY PAGE -->
  <section id="memoryPage" class="page">
    <p class="memory-title">OUR MEMORIES</p>
    <h1 class="memory-heading">Forever Us</h1>

    <div class="photo-card">
      <img src="IMG-20260528-WA0006(1).jpg" alt="Puja photo 1">
      <div class="photo-caption">Beautiful Puja ❤️</div>
    </div>

    <div class="photo-card">
      <img src="IMG-20260313-WA0046.jpg" alt="Puja photo 2">
      <div class="photo-caption">Our Sweet Memory ❤️</div>
    </div>

    <div class="photo-card">
      <img src="IMG-20260618-WA0019.jpg" alt="Puja photo 3">
      <div class="photo-caption">My Favourite Smile ❤️</div>
    </div>

    <div class="photo-card">
      <img src="IMG-20251021-WA0071.jpg" alt="Puja photo 4">
      <div class="photo-caption">Together Forever ❤️</div>
    </div>

    <div class="photo-card">
      <img src="IMG-20260313-WA0053.jpg" alt="Puja photo 5">
      <div class="photo-caption">Happy Birthday Puja ❤️</div>
    </div>
  </section>

  <script>
    const canvas = document.getElementById("scratchCanvas");
    const ctx = canvas.getContext("2d");
    const wrap = document.getElementById("scratchWrap");
    const help = document.querySelector(".scratch-help");
    let drawing = false;
    let completed = false;

    function setupCanvas() {
      const rect = wrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + "px";
      canvas.style.height = rect.height + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "#b45b78";
      ctx.fillRect(0, 0, rect.width, rect.height);

      ctx.fillStyle = "rgba(255,255,255,.16)";
      for (let i = 0; i < 65; i++) {
        ctx.beginPath();
        ctx.arc(
          Math.random() * rect.width,
          Math.random() * rect.height,
          Math.random() * 4 + 1,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }
    }

    function point(event) {
      const rect = canvas.getBoundingClientRect();
      const touch = event.touches ? event.touches[0] : event;
      return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
      };
    }

    function scratch(event) {
      if (!drawing || completed) return;
      event.preventDefault();

      const p = point(event);
      help.style.display = "none";

      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath();
      ctx.arc(p.x, p.y, 28, 0, Math.PI * 2);
      ctx.fill();

      checkScratch();
    }

    function checkScratch() {
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      let clear = 0;

      for (let i = 3; i < pixels.length; i += 40) {
        if (pixels[i] === 0) clear++;
      }

      const total = pixels.length / 40;
      if (clear / total > 0.42) openMemory();
    }

    function openMemory() {
      if (completed) return;
      completed = true;

      document.getElementById("goldenReveal").classList.add("show");
      createPetalsAndConfetti(45);

      setTimeout(() => {
        document.getElementById("birthdayPage").classList.remove("active");
        document.getElementById("memoryPage").classList.add("active");
        document.getElementById("goldenReveal").classList.remove("show");
        createPetalsAndConfetti(75);
        window.scrollTo(0, 0);
      }, 1700);
    }

    canvas.addEventListener("pointerdown", (e) => {
      drawing = true;
      canvas.setPointerCapture(e.pointerId);
      scratch(e);
    });

    canvas.addEventListener("pointermove", scratch);

    canvas.addEventListener("pointerup", () => drawing = false);
    canvas.addEventListener("pointercancel", () => drawing = false);

    function createPetalsAndConfetti(count) {
      for (let i = 0; i < count; i++) {
        const el = document.createElement("div");
        el.className = Math.random() > 0.42 ? "petal" : "confetti";
        el.style.left = Math.random() * 100 + "vw";
        el.style.animationDuration = (4 + Math.random() * 5) + "s";
        el.style.animationDelay = (Math.random() * 1.2) + "s";
        el.style.setProperty("--drift", (Math.random() * 180 - 90) + "px");

        if (el.className === "petal") {
          el.style.background = Math.random() > .5 ? "#ff9ab7" : "#ffe18b";
        } else {
          el.style.background = Math.random() > .5 ? "#ffd35b" : "#f29ab2";
        }

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 10500);
      }
    }

    window.addEventListener("resize", setupCanvas);
    setupCanvas();
  </script>

</body>
</html>
