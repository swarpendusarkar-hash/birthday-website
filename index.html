<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Puja ❤️</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      min-height:100vh;
      background:#f47b91;
      font-family:Arial, sans-serif;
      overflow:hidden;
    }

    .birthday-page{
      min-height:100vh;
      width:100%;
      background:url("birthday-bg.png") center center / cover no-repeat;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:0 20px 11vh;
    }

    .open-btn{
      width:min(82vw, 430px);
      padding:18px 20px;
      border:2px solid white;
      border-radius:50px;
      background:rgba(235, 42, 105, 0.55);
      color:white;
      font-size:clamp(21px, 5vw, 30px);
      font-weight:bold;
      text-decoration:none;
      text-align:center;
      box-shadow:0 8px 22px rgba(100,0,35,.35);
    }

    .open-btn:active{
      transform:scale(.95);
    }
  </style>
</head>

<body>
  <main class="birthday-page">
    <a class="open-btn" href="#surprise">Open Your Surprise 🎁</a>
  </main>
</body>
</html>
