<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Puja</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  background:#fff5f7;
}
.page{
  min-height:100vh;
  width:100%;
  display:none;
  position:relative;
  overflow:hidden;
}
.page.active{display:flex}

/* 1. Fingerprint cover */
#coverPage{
  background:
    linear-gradient(rgba(20,0,0,.12),rgba(20,0,0,.12)),
    url("file_00000000792471fab9d1ed26ab406cbf.png") center/cover no-repeat;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.coverTap{
  width:230px;
  height:230px;
  border-radius:50%;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:5;
}
.coverText{
  position:absolute;
  top:42%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  text-align:center;
  color:#f6d47a;
  font-size:clamp(26px,7vw,42px);
  font-family:cursive;
  text-shadow:0 2px 8px #260000;
  pointer-events:none;
  z-index:3;
}

/* 2. Golden ribbon light animation */
#goldenPage{
  background:#2b0909;
  align-items:center;
  justify-content:center;
}
.goldenBg{
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(65,10,10,.55),rgba(65,10,10,.55)),
    url("file_00000000792471fab9d1ed26ab406cbf.png") center/cover no-repeat;
  opacity:.48;
}
.ring{
  position:absolute;
  width:70vw;
  height:70vw;
  max-width:390px;
  max-height:390px;
  border-radius:50%;
  border:7px solid rgba(255,218,104,.9);
  box-shadow:
    0 0 15px #fff4b2,
    0 0 45px #ffd45d,
    0 0 95px #ff8d2c;
  animation:ringOpen 2.2s ease-in-out forwards;
  z-index:2;
}
.ring:before,.ring:after{
  content:"";
  position:absolute;
  inset:-18px;
  border-radius:50%;
  border:3px solid rgba(255,241,172,.75);
  animation:spin 1.7s linear infinite;
}
.ring:after{
  inset:20px;
  border-color:rgba(255,158,60,.8);
  animation-direction:reverse;
}
.lightCenter{
  position:absolute;
  width:30px;
  height:30px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 25px 15px #fff6bc,0 0 80px 35px #ffbd3d;
  z-index:3;
  animation:flash 3.2s ease-in-out forwards;
}
.spark{
  position:absolute;
  width:7px;
  height:7px;
  border-radius:50%;
  background:#fff7b0;
  box-shadow:0 0 12px #fff;
  animation:sparkMove 2s ease-in-out infinite;
}
@keyframes ringOpen{
  0%{transform:scale(.05);opacity:0}
  35%{transform:scale(.8);opacity:1}
  80%{transform:scale(1.15);opacity:1}
  100%{transform:scale(1.8);opacity:0}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes flash{
  0%,20%{transform:scale(.2);opacity:.2}
  65%{transform:scale(2.7);opacity:1}
  100%{transform:scale(7);opacity:0}
}
@keyframes sparkMove{
  0%{transform:translate(0,0) scale(.5);opacity:0}
  40%{opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(1.4);opacity:0}
}

/* 3. Birthday page */
#birthdayPage{
  background:
    linear-gradient(rgba(255,130,170,.04),rgba(255,130,170,.04)),
    url("file_00000000f70471fb966e130dbdfbbd9d.png") center/cover no-repeat;
  align-items:flex-end;
  justify-content:center;
  padding:0 18px 45px;
}
.dateButton{
  width:min(88%,480px);
  border:3px solid rgba(255,255,255,.96);
  border-radius:35px;
  padding:17px 14px;
  text-align:center;
  color:white;
  font-weight:800;
  font-size:clamp(22px,6vw,32px);
  letter-spacing:1px;
  background:linear-gradient(135deg,#ff4c83,#e70b65);
  box-shadow:0 8px 24px rgba(184,0,74,.45),inset 0 0 14px rgba(255,255,255,.35);
  cursor:pointer;
  z-index:4;
  animation:datePulse 1.8s infinite;
}
.dateButton small{
  display:block;
  font-size:13px;
  margin-top:5px;
  letter-spacing:3px;
}
@keyframes datePulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.035)}
}

/* 4. Memory page */
#memoryPage{
  min-height:100vh;
  display:block;
  background:linear-gradient(#fffaf7,#fff0f4);
  padding:42px 16px 55px;
}
.memoryTitle{
  text-align:center;
  color:#a25461;
  margin-bottom:26px;
  position:relative;
  z-index:2;
}
.memoryTitle small{
  display:block;
  font-size:14px;
  letter-spacing:5px;
  margin-bottom:8px;
}
.memoryTitle h1{
  margin:0;
  font-family:Georgia,serif;
  font-size:clamp(45px,12vw,72px);
}
.gallery{
  width:min(100%,620px);
  margin:auto;
  position:relative;
  z-index:2;
}
.photoCard{
  background:#fff;
  border-radius:18px;
  padding:12px 12px 18px;
  margin:0 auto 28px;
  box-shadow:0 12px 28px rgba(139,61,86,.18);
  transform:rotate(-1deg);
}
.photoCard:nth-child(even){transform:rotate(1deg)}
.photoCard img{
  width:100%;
  display:block;
  border-radius:10px;
  max-height:620px;
  object-fit:cover;
}
.caption{
  text-align:center;
  font-family:cursive;
  font-size:28px;
  color:#a25461;
  padding-top:12px;
}

/* petals + confetti */
.petal,.confetti{
  position:fixed;
  top:-40px;
  pointer-events:none;
  z-index:20;
  animation:fall linear forwards;
}
.petal{
  width:12px;
  height:18px;
  border-radius:70% 30% 70% 30%;
  opacity:.88;
}
.confetti{
  width:7px;
  height:12px;
  border-radius:2px;
  opacity:.85;
}
@keyframes fall{
  0%{transform:translate3d(0,-30px,0) rotate(0deg);opacity:0}
  8%{opacity:.9}
  100%{transform:translate3d(var(--drift),110vh,0) rotate(620deg);opacity:.75}
}
</style>
</head>

<body>

<section id="coverPage" class="page active">
  <div class="coverTap" onclick="openGolden()"></div>
</section>

<section id="goldenPage" class="page">
  <div class="goldenBg"></div>
  <div class="ring"></div>
  <div class="lightCenter"></div>
</section>

<section id="birthdayPage" class="page">
  <button class="dateButton" onclick="openMemories()">
    26 NOVEMBER 2026
    <small>TAP HERE ❤️</small>
  </button>
</section>

<section id="memoryPage" class="page">
  <div class="memoryTitle">
    <small>OUR MEMORIES</small>
    <h1>Forever Us</h1>
  </div>

  <div class="gallery">
    <div class="photoCard">
      <img src="IMG-20260528-WA0006(1).jpg" alt="Puja">
      <div class="caption">Beautiful Puja ❤️</div>
    </div>

    <div class="photoCard">
      <img src="IMG-20260313-WA0046.jpg" alt="Puja memory">
      <div class="caption">Our Lovely Memory 💕</div>
    </div>

    <div class="photoCard">
      <img src="IMG-20260618-WA0019.jpg" alt="Puja">
      <div class="caption">My Favourite Smile 🌸</div>
    </div>

    <div class="photoCard">
      <img src="IMG-20251021-WA0071.jpg" alt="Together">
      <div class="caption">Together Forever ❤️</div>
    </div>

    <div class="photoCard">
      <img src="IMG-20260313-WA0053.jpg" alt="Puja">
      <div class="caption">Happy Birthday Puja 🎂</div>
    </div>
  </div>
</section>

<script>
function showPage(id){
  document.querySelectorAll(".page").forEach(page=>{
    page.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

function openGolden(){
  showPage("goldenPage");

  for(let i=0;i<32;i++){
    const spark=document.createElement("div");
    spark.className="spark";
    const angle=Math.random()*Math.PI*2;
    const distance=120+Math.random()*240;
    spark.style.left="50%";
    spark.style.top="50%";
    spark.style.setProperty("--x",Math.cos(angle)*distance+"px");
    spark.style.setProperty("--y",Math.sin(angle)*distance+"px");
    spark.style.animationDelay=(Math.random()*.5)+"s";
    document.getElementById("goldenPage").appendChild(spark);
    setTimeout(()=>spark.remove(),2500);
  }

  setTimeout(()=>{
    showPage("birthdayPage");
    createPetalsAndConfetti(45);
  },2200);
}

function openMemories(){
  showPage("memoryPage");
  createPetalsAndConfetti(110);
}

function createPetalsAndConfetti(total){
  const petalColors=["#f6a8bf","#ffd0db","#f4c95d","#fff0a8","#ec91ad"];
  const confettiColors=["#f5c84b","#f0a1b7","#bd6978","#ffe59b","#ffffff"];

  for(let i=0;i<total;i++){
    const item=document.createElement("div");
    const isPetal=Math.random()>.42;
    item.className=isPetal ? "petal" : "confetti";
    item.style.left=(Math.random()*100)+"vw";
    item.style.background=isPetal
      ? petalColors[Math.floor(Math.random()*petalColors.length)]
      : confettiColors[Math.floor(Math.random()*confettiColors.length)];
    item.style.setProperty("--drift",((Math.random()*180)-90)+"px");
    item.style.animationDuration=(5+Math.random()*5)+"s";
    item.style.animationDelay=(Math.random()*2.5)+"s";
    document.body.appendChild(item);
    setTimeout(()=>item.remove(),12500);
  }
}
</script>

</body>
</html>
