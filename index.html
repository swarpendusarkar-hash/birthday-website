<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Puja ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#1b0509;overflow:hidden}

/* সব page */
.page{
  position:fixed;
  inset:0;
  width:100%;
  min-height:100vh;
  display:none;
  overflow:hidden;
}
.page.active{display:flex}

/* 1. Fingerprint cover */
#coverPage{
  background:url("file_00000000792471fab9d1ed26ab406cbf.png") center/cover no-repeat;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

#coverPage::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(20,0,0,.10);
}

.coverClick{
  position:absolute;
  inset:0;
  z-index:3;
}

/* Golden ring animation */
#goldAnimation{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
  overflow:hidden;
}

#goldAnimation.show{display:flex}

.ring{
  width:120px;
  height:120px;
  border:5px solid #ffd36a;
  border-radius:50%;
  box-shadow:
    0 0 18px #fff3bd,
    0 0 45px #ffd15c,
    0 0 100px #ffae00;
  animation:ringOpen 1.8s ease-out forwards;
}

.light{
  position:absolute;
  width:90px;
  height:90px;
  border-radius:50%;
  background:radial-gradient(circle,#fffde2 0%,#ffd567 28%,rgba(255,177,0,.45) 52%,transparent 72%);
  animation:lightOpen 1.8s ease-out forwards;
}

@keyframes ringOpen{
  0%{transform:scale(.2);opacity:0}
  20%{opacity:1}
  100%{transform:scale(13);opacity:0}
}

@keyframes lightOpen{
  0%{transform:scale(.2);opacity:0}
  35%{transform:scale(4);opacity:1}
  100%{transform:scale(15);opacity:0}
}

/* 2. Happy Birthday page */
#birthdayPage{
  background:url("file_00000000f70471fb966e130dbdfbbd9d.png") center/cover no-repeat;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:9vh;
}

.surpriseBtn{
  width:min(86vw,420px);
  padding:18px 18px;
  border-radius:50px;
  border:3px solid white;
  background:linear-gradient(135deg,#ff5f91,#e82068);
  color:white;
  font-size:clamp(20px,5vw,28px);
  font-weight:bold;
  box-shadow:0 8px 25px rgba(175,0,72,.45);
  cursor:pointer;
  z-index:5;
  animation:btnPulse 2s infinite;
}

@keyframes btnPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.04)}
}

/* হালকা confetti */
.confetti{
  position:fixed;
  top:-20px;
  width:6px;
  height:10px;
  border-radius:2px;
  opacity:.7;
  pointer-events:none;
  z-index:30;
  animation:fall linear forwards;
}

@keyframes fall{
  from{transform:translateY(-20px) rotate(0deg)}
  to{transform:translateY(110vh) rotate(480deg)}
}

/* 3. Photo memory page */
#memoryPage{
  background:linear-gradient(180deg,#fff9f5,#ffe6ee);
  overflow-y:auto;
  flex-direction:column;
  align-items:center;
  padding:38px 16px 60px;
}

.memorySmall{
  color:#a76b72;
  font-size:14px;
  letter-spacing:5px;
  margin-top:5px;
}

.memoryTitle{
  color:#8d4a53;
  font-family:Georgia,serif;
  font-size:clamp(46px,13vw,72px);
  margin:10px 0 30px;
  text-align:center;
}

.photoStack{
  width:min(94vw,560px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
}

.photoCard{
  width:92%;
  background:#fff;
  padding:12px 12px 24px;
  border-radius:8px;
  box-shadow:0 15px 32px rgba(90,30,45,.22);
  opacity:0;
  animation:photoIn .8s ease forwards;
}

.photoCard:nth-child(1){transform:translateY(40px) rotate(-3deg);animation-delay:.1s}
.photoCard:nth-child(2){transform:translateY(40px) rotate(3deg);animation-delay:.25s}
.photoCard:nth-child(3){transform:translateY(40px) rotate(-2deg);animation-delay:.4s}
.photoCard:nth-child(4){transform:translateY(40px) rotate(3deg);animation-delay:.55s}
.photoCard:nth-child(5){transform:translateY(40px) rotate(-3deg);animation-delay:.7s}

@keyframes photoIn{
  to{opacity:1;transform:translateY(0) rotate(0deg)}
}

.photoCard img{
  width:100%;
  max-height:620px;
  object-fit:cover;
  display:block;
  border-radius:4px;
}

.caption{
  color:#914c55;
  text-align:center;
  font-family:cursive;
  font-size:23px;
  padding-top:11px;
}

.lastText{
  color:#914c55;
  font-family:Georgia,serif;
  font-size:21px;
  line-height:1.5;
  text-align:center;
  margin:35px 10px 0;
}
</style>
</head>

<body>

<!-- COVER -->
<section id="coverPage" class="page active">
  <div class="coverClick" onclick="openCover()"></div>
</section>

<!-- GOLDEN LIGHT ANIMATION -->
<div id="goldAnimation">
  <div class="light"></div>
  <div class="ring"></div>
</div>

<!-- BIRTHDAY -->
<section id="birthdayPage" class="page">
  <button class="surpriseBtn" onclick="openMemory()">
    Open Your Surprise 🎁
  </button>
</section>

<!-- MEMORY PAGE -->
<section id="memoryPage" class="page">
  <div class="memorySmall">OUR MEMORIES</div>
  <div class="memoryTitle">Forever Us</div>

  <div class="photoStack">

    <div class="photoCard">
      <img src="IMG-20260528-WA0006(1).jpg" alt="Puja">
      <div class="caption">Beautiful Puja ❤️</div>
    </div>

    <div class="photoCard">
      <img src="IMG-20260313-WA0046.jpg" alt="Puja">
      <div class="caption">Our Lovely Memory ❤️</div>
    </div>

    <div class="photoCard">
      <img src="IMG-20260618-WA0019.jpg" alt="Puja">
      <div class="caption">My Favourite Smile ✨</div>
    </div>

    <div class="photoCard">
      <img src="IMG-20251021-WA0071.jpg" alt="Puja">
      <div class="caption">Together Forever ❤️</div>
    </div>

    <div class="photoCard">
      <img src="IMG-20260313-WA0053.jpg" alt="Puja">
      <div class="caption">Happy Birthday Puja 🎂</div>
    </div>

  </div>

  <div class="lastText">
    তোমার হাসি, স্বপ্ন আর ভালোবাসায়<br>
    জীবন সবসময় সুন্দর থাকুক ❤️
  </div>
</section>

<script>
let coverOpened = false;

function openCover(){
  if(coverOpened) return;
  coverOpened = true;

  const animation = document.getElementById("goldAnimation");
  animation.classList.add("show");

  setTimeout(function(){
    document.getElementById("coverPage").classList.remove("active");
    animation.classList.remove("show");
    document.getElementById("birthdayPage").classList.add("active");
    createConfetti(18);
  }, 1750);
}

function openMemory(){
  document.getElementById("birthdayPage").classList.remove("active");
  document.getElementById("memoryPage").classList.add("active");
  createConfetti(16);
}

function createConfetti(total){
  const colors=["#f3a1b7","#ffd66c","#f7c8d4","#e38da6","#fff0a6"];

  for(let i=0;i<total;i++){
    setTimeout(function(){
      const piece=document.createElement("div");
      piece.className="confetti";
      piece.style.left=(Math.random()*100)+"vw";
      piece.style.background=colors[Math.floor(Math.random()*colors.length)];
      piece.style.animationDuration=(5+Math.random()*4)+"s";
      document.body.appendChild(piece);

      setTimeout(function(){
        piece.remove();
      },9500);
    },i*180);
  }
}
</script>

</body>
</html>
