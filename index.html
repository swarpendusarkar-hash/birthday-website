<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Puja ❤️</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial, sans-serif;
      overflow:hidden;
      background:#3a0d14;
    }

    .screen{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    /* প্রথম Puja fingerprint cover */
    #cover{
      background-image:url("file_00000000792471fab9d1ed26ab406cbf.png");
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index:10;
      transition:transform 1.1s ease-in-out, opacity 1.1s ease-in-out;
    }

    #cover::after{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(35,0,5,0.10);
    }

    .tap-area{
      position:relative;
      z-index:2;
      width:52%;
      max-width:290px;
      height:32%;
      position:absolute;
      top:46%;
      left:24%;
      border-radius:50%;
    }

    .tap-text{
      position:absolute;
      z-index:3;
      top:40%;
      left:50%;
      transform:translateX(-50%);
      color:#f7d889;
      font-family:cursive;
      font-size:28px;
      white-space:nowrap;
      text-shadow:0 2px 8px #260006;
      animation:pulse 1.4s infinite;
      pointer-events:none;
    }

    @keyframes pulse{
      0%,100%{transform:translateX(-50%) scale(1);}
      50%{transform:translateX(-50%) scale(1.08);}
    }

    /* Cover খোলার animation */
    #cover.open{
      opacity:0;
      transform:scale(1.25) rotate(-2deg);
      pointer-events:none;
    }

    /* Birthday page */
    #birthday{
      display:none;
      background-image:url("file_00000000f70471fb966e130dbdfbbd9d.png");
      z-index:1;
      animation:appear 1.2s ease-out forwards;
    }

    #birthday.show{
      display:block;
    }

    @keyframes appear{
      from{opacity:0; transform:scale(1.08);}
      to{opacity:1; transform:scale(1);}
    }

    .decor{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
    }

    .flower,.balloon,.confetti{
      position:absolute;
      animation:floatUp linear infinite;
      filter:drop-shadow(0 3px 4px rgba(0,0,0,.25));
    }

    .flower{
      font-size:32px;
    }

    .balloon{
      font-size:42px;
    }

    .confetti{
      font-size:28px;
    }

    @keyframes floatUp{
      0%{
        transform:translateY(110vh) rotate(0deg);
        opacity:0;
      }
      10%{opacity:1;}
      100%{
        transform:translateY(-20vh) rotate(360deg);
        opacity:0;
      }
    }

    .one{left:4%;animation-duration:9s;animation-delay:0s;}
    .two{left:18%;animation-duration:12s;animation-delay:2s;}
    .three{left:34%;animation-duration:10s;animation-delay:1s;}
    .four{left:50%;animation-duration:13s;animation-delay:3s;}
    .five{left:66%;animation-duration:11s;animation-delay:0s;}
    .six{left:80%;animation-duration:9s;animation-delay:2s;}
    .seven{left:92%;animation-duration:12s;animation-delay:1s;}

    .birthday-button{
      position:absolute;
      bottom:8%;
      left:50%;
      transform:translateX(-50%);
      border:2px solid white;
      background:rgba(255,70,130,.62);
      color:white;
      padding:16px 30px;
      border-radius:40px;
      font-size:20px;
      font-weight:bold;
      box-shadow:0 8px 22px rgba(90,0,35,.35);
      white-space:nowrap;
    }

    @media(max-width:420px){
      .tap-text{font-size:23px;}
      .birthday-button{font-size:17px;padding:14px 22px;}
    }
  </style>
</head>

<body>

  <!-- প্রথমে Puja fingerprint cover -->
  <section id="cover" class="screen" onclick="openBirthday()">
    <div class="tap-text">Tap to Reveal</div>
    <div class="tap-area"></div>
  </section>

  <!-- Tap করার পরে Happy Birthday image -->
  <section id="birthday" class="screen">
    <div class="decor">
      <div class="flower one">🌹</div>
      <div class="balloon two">🎈</div>
      <div class="confetti three">🎊</div>
      <div class="flower four">🌸</div>
      <div class="balloon five">🎈</div>
      <div class="confetti six">✨</div>
      <div class="flower seven">🌹</div>

      <div class="confetti one" style="animation-delay:4s;">🎉</div>
      <div class="flower three" style="animation-delay:5s;">🌺</div>
      <div class="balloon five" style="animation-delay:6s;">🎈</div>
      <div class="confetti seven" style="animation-delay:4s;">💖</div>
    </div>

    <div class="birthday-button">Happy Birthday Puja 🎁</div>
  </section>

  <script>
    function openBirthday(){
      const cover = document.getElementById("cover");
      const birthday = document.getElementById("birthday");

      cover.classList.add("open");

      setTimeout(function(){
        birthday.classList.add("show");
      }, 650);

      setTimeout(function(){
        cover.style.display = "none";
      }, 1200);
    }
  </script>

</body>
</html>
