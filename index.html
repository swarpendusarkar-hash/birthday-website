<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Puja ❤️</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;min-height:100%;font-family:Arial,sans-serif;overflow-x:hidden}
body{background:#210509}

/* Pages */
.page{
  display:none;
  min-height:100vh;
  width:100%;
  position:relative;
  overflow:hidden;
}
.page.active{display:flex}

/* 1. Fingerprint cover */
#coverPage{
  background:url("file_00000000792471fab9d1ed26ab406cbf.png") center/cover no-repeat;
  cursor:pointer;
}
.coverTap{
  position:absolute;
  inset:0;
  z-index:5;
}

/* 2. Golden ribbon opening */
#goldenPage{
  background:#27070a;
  align-items:center;
  justify-content:center;
}
.goldenBg{
  position:absolute;
  inset:0;
  background:url("file_00000000792471fab9d1ed26ab406cbf.png") center/cover no-repeat;
  background-size:cover;
  background-position:center;
  opacity:.30;
  filter:blur(2px) brightness(.55);
}
.magicCore{
  position:relative;
  width:120px;
  height:120px;
  z-index:4;
}
.coreLight{
  position:absolute;
  inset:35px;
  border-radius:50%;
  background:#fff8bd;
  box-shadow:0 0 25px 12px #fff4a3,0 0 85px 35px #ffc33b,0 0 170px 75px #ff8e1f;
  animation:coreBurst 2.7s ease-in forwards;
}
.ribbon{
  position:absolute;
  top:50%;
  left:50%;
  width:430px;
  height:145px;
  border-radius:50%;
  border:12px solid rgba(255,224,139,.9);
  border-left-color:rgba(255,255,255,.18);
  border-right-color:rgba(255,174,49,.55);
  box-shadow:0 0 13px #fff1aa,0 0 34px #f7a431;
  transform:translate(-50%,-50%) scale(.18);
  animation:ribbonSpin 2.7s linear forwards;
}
.ribbon.two{
  transform:translate(-50%,-50%) rotate(120deg) scale(.18);
  animation-delay:.12s;
}
.ribbon.three{
  transform:translate(-50%,-50%) rotate(240deg) scale(.18);
  animation-delay:.24s;
}
.redRing{
  position:absolute;
  top:50%;
  left:50%;
  width:210px;
  height:210px;
  border-radius:50%;
  border:4px solid rgba(255,68,51,.75);
  box-shadow:0 0 22px #ff4d3b,0 0 65px #ff3928;
  transform:translate(-50%,-50%);
  animation:redExpand 2.7s ease-out forwards;
}
.spark{
  position:absolute;
  top:50%;
  left:50%;
  width:7px;
  height:7px;
  border-radius:50%;
  background:#fff5b2;
  box-shadow:0 0 12px #ffd24f;
  animation:sparkOut 2.5s ease-out forwards;
}
@keyframes ribbonSpin{
  0%{opacity:0;transform:translate(-50%,-50%) rotate(0deg) scale(.12)}
  15%{opacity:1}
  72%{opacity:1}
  100%{opacity:0;transform:translate(-50%,-50%) rotate(760deg) scale(2.6)}
}
@keyframes coreBurst{
  0%,48%{opacity:0;transform:scale(.15)}
  65%{opacity:1;transform:scale(1.6)}
  100%{opacity:0;transform:scale(16)}
}
@keyframes redExpand{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
  22%{opacity:1}
  100%{opacity:0;transform:translate(-50%,-50%) scale(3.3)}
}
@keyframes sparkOut{
  0%{transform:translate(-50%,-50%) rotate(var(--angle)) translateX(0);opacity:1}
  100%{transform:translate(-50%,-50%) rotate(var(--angle)) translateX(var(--distance));opacity:0}
}

/* 3. Birthday page */
#birthdayPage{
  background:url("file_00000000f70471fb966e130dbdfbbd9d.png") center/cover no-repeat;
  align-items:flex-end;
  justify-content:center;
}
.dateTap{
  position:absolute;
  left:50%;
  top:82%;
  transform:translate(-50%,-50%);
  width:min(76vw,420px);
  padding:18px 14px;
  text-align:center;
  cursor:pointer;
  border-radius:24px;
  background:rgba(239,35,110,.35);
  border:2px solid rgba(255,255,255,.95);
  box-shadow:0 8px 24px rgba(150,0,65,.35);
  color:white;
  animation:datePulse 2s ease-in-out infinite;
}
.dateSmall{font-size:11px;letter-spacing:4px;font-weight:bold;margin-bottom:6px;color:#fff}
.birthdayDate{
  font-family:Georgia,serif;
  font-size:clamp(27px,7vw,40px);
  font-weight:bold;
  line-height:1.05;
  color:#fff8d5;
  text-shadow:0 2px 7px #b30045;
}
@keyframes datePulse{
  0%,100%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-50%) scale(1.04)}
}

/* 4. Memory page */
#memoryPage{
  display:none;
  min-height:100vh;
  flex-direction:column;
  align-items:center;
  background:linear-gradient(#fffaf6,#ffe8ee);
  padding:42px 18px 80px;
  overflow-y:auto;
}
#memoryPage.active{display:flex}
.memoryTop{text-align:center;margin-bottom:28px;position:relative;z-index:2}
.memoryTop p{margin:0 0 8px;letter-spacing:5px;font-size:13px;color:#b5808c;font-weight:bold}
.memoryTop h1{margin:0;color:#914f5d;font-family:Georgia,serif;font-size:clamp(44px,12vw,70px)}
.photoCard{
  width:min(92vw,620px);
  background:#fff;
  padding:18px 18px 22px;
  border-radius:18px;
  box-shadow:0 14px 30px rgba(142,69,88,.20);
  margin:0 0 32px;
  position:relative;
  z-index:2;
}
.photoCard img{width:100%;max-height:680px;object-fit:cover;border-radius:9px;display:block}
.photoCard p{text-align:center;margin:16px 0 0;color:#a15b6c;font-family:Georgia,serif;font-size:28px}

/* Petals + confetti */
.petal,.confetti{
  position:fixed;
  top:-40px;
  pointer-events:none;
  z-index:99;
  opacity:.85;
  animation:fallDown linear forwards;
}
.petal{width:15px;height:10px;border-radius:85% 0 85% 0}
.confetti{width:7px;height:12px;border-radius:2px}
@keyframes fallDown{
  0%{transform:translateY(-50px) translateX(0) rotate(0deg);opacity:0}
  8%{opacity:.85}
  45%{transform:translateY(48vh) translateX(35px) rotate(220deg)}
  75%{transform:translateY(78vh) translateX(-28px) rotate(390deg)}
  100%{transform:translateY(112vh) translateX(25px) rotate(620deg);opacity:.15}
}
</style>
</head>

<body>

<section id="coverPage" class="page active" onclick="startGolden()">
  <div class="coverTap"></div>
</section>

<section id="goldenPage" class="page">
  <div class="goldenBg"></div>
  <div class="magicCore">
    <div class="redRing"></div>
    <div class="ribbon"></div>
    <div class="ribbon two"></div>
    <div class="ribbon three"></div>
    <div class="coreLight"></div>

    <div class="spark" style="--angle:0deg;--distance:280px"></div>
    <div class="spark" style="--angle:30deg;--distance:320px"></div>
    <div class="spark" style="--angle:60deg;--distance:280px"></div>
    <div class="spark" style="--angle:90deg;--distance:330px"></div>
    <div class="spark" style="--angle:120deg;--distance:290px"></div>
    <div class="spark" style="--angle:150deg;--distance:320px"></div>
    <div class="spark" style="--angle:180deg;--distance:280px"></div>
    <div class="spark" style="--angle:210deg;--distance:330px"></div>
    <div class="spark" style="--angle:240deg;--distance:290px"></div>
    <div class="spark" style="--angle:270deg;--distance:320px"></div>
    <div class="spark" style="--angle:300deg;--distance:280px"></div>
    <div class="spark" style="--angle:330deg;--distance:330px"></div>
  </div>
</section>

<section id="birthdayPage" class="page">
  <div class="dateTap" onclick="openMemory()">
    <div class="dateSmall">A SPECIAL DAY</div>
    <div class="birthdayDate">26 NOVEMBER<br>2026</div>
  </div>
</section>

<section id="memoryPage" class="page">
  <div class="memoryTop">
    <p>OUR MEMORIES</p>
    <h1>Forever Us</h1>
  </div>

  <div class="photoCard"><img src="IMG-20260528-WA0006(1).jpg" alt="Puja"><p>Beautiful Puja ❤️</p></div>
  <div class="photoCard"><img src="IMG-20260313-WA0046.jpg" alt="Puja"><p>Our Lovely Moment ❤️</p></div>
  <div class="photoCard"><img src="IMG-20260618-WA0019.jpg" alt="Puja"><p>My Favourite Smile 🌸</p></div>
  <div class="photoCard"><img src="IMG-20251021-WA0071.jpg" alt="Puja"><p>Always Together ❤️</p></div>
  <div class="photoCard"><img src="IMG-20260313-WA0053.jpg" alt="Puja"><p>Forever My Puja ❤️</p></div>
</section>

<script>
let started=false;

function showPage(id){
  document.querySelectorAll(".page").forEach(function(page){
    page.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

function startGolden(){
  if(started) return;
  started=true;

  showPage("goldenPage");

  setTimeout(function(){
    showPage("birthdayPage");
    createPetalsAndConfetti(35);
  },2700);
}

function openMemory(){
  showPage("memoryPage");
  createPetalsAndConfetti(85);
}

function createPetalsAndConfetti(total){
  const petalColors=["#f7b6c8","#ffd2dc","#f3c85c","#fff0b8","#e98ca9"];
  const confettiColors=["#f6c94d","#f2a3b7","#b56a76","#f9df9a","#ffffff"];

  for(let i=0;i<total;i++){
    const item=document.createElement("div");
    const isPetal=Math.random()>0.35;

    item.className=isPetal ? "petal" : "confetti";
    item.style.left=(Math.random()*100)+"vw";
    item.style.background=isPetal
      ? petalColors[Math.floor(Math.random()*petalColors.length)]
      : confettiColors[Math.floor(Math.random()*confettiColors.length)];
    item.style.animationDuration=(6+Math.random()*6)+"s";
    item.style.animationDelay=(Math.random()*3)+"s";

    document.body.appendChild(item);
    setTimeout(function(){item.remove()},15000);
  }
}
</script>

</body>
</html>
