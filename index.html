<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Puja</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:Arial,sans-serif;overflow:hidden}

.page{
  position:fixed;
  inset:0;
  display:none;
  overflow:hidden;
}
.page.active{display:flex}

/* 1. Cover page */
#cover{
  display:flex;
  background-image:url("file_00000000792471fab9d1ed26ab406cbf.png");
  background-size:cover;
  background-position:center;
  cursor:pointer;
}

/* 2. Golden animation */
#animation{
  display:none;
  align-items:center;
  justify-content:center;
  background:#3b0a10;
}
#animation.active{display:flex}

#animation::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("file_00000000792471fab9d1ed26ab406cbf.png");
  background-size:cover;
  background-position:center;
  opacity:.45;
}

.goldLight{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#fff7b0;
  box-shadow:
    0 0 20px 10px #ffd54d,
    0 0 80px 35px #ff9d2f,
    0 0 180px 90px #fff2a4;
  z-index:5;
  animation:goldOpen 2.2s ease-out forwards;
}

@keyframes goldOpen{
  0%{transform:scale(.1);opacity:0}
  30%{transform:scale(1.4);opacity:1}
  100%{transform:scale(20);opacity:0}
}

/* 3. Birthday photo page */
#birthday{
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding-bottom:55px;
  background-image:url("file_00000000f70471fb966e130dbdfbbd9d.png");
  background-size:cover;
  background-position:center;
}

#birthday.active{display:flex}

#surpriseButton{
  width:82%;
  max-width:420px;
  padding:17px 12px;
  border-radius:50px;
  border:2px solid white;
  color:white;
  font-size:22px;
  font-weight:bold;
  background:rgba(232,28,105,.70);
  box-shadow:0 8px 22px rgba(100,0,25,.45);
  cursor:pointer;
  z-index:10;
  animation:buttonPulse 1.5s infinite;
}

@keyframes buttonPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}

/* 4. Final wish */
#final{
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  text-align:center;
  background:linear-gradient(#ff9db5,#ff668d,#ffc29b);
}
#final.active{display:flex}

.message{
  padding:30px 18px;
  border-radius:28px;
  background:rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 15px 35px rgba(110,0,35,.3);
  animation:messageOpen .8s ease-out;
}

.message h1{
  margin:0 0 18px;
  font-family:cursive;
  font-size:42px;
  text-shadow:0 3px 10px #a00035;
}
.message p{
  margin:0;
  font-size:21px;
  line-height:1.65;
  font-weight:bold;
}

@keyframes messageOpen{
  from{opacity:0;transform:scale(.5) translateY(50px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

/* Flowers/confetti */
.confetti{
  position:fixed;
  top:-45px;
  z-index:100;
  pointer-events:none;
  animation:drop linear forwards;
}
@keyframes drop{
  to{
    transform:translate(var(--side),110vh) rotate(720deg);
    opacity:.9;
  }
}
</style>
</head>

<body>

<div id="cover" class="page active" onclick="openCover()"></div>

<div id="animation" class="page">
  <div class="goldLight"></div>
</div>

<div id="birthday" class="page">
  <button id="surpriseButton" onclick="openSurprise()">Open Your Surprise 🎁</button>
</div>

<div id="final" class="page">
  <div class="message">
    <h1>Happy Birthday Puja 🎉</h1>
    <p>
      আজ তোমার special দিন।<br>
      তোমার হাসি, স্বপ্ন আর ভালোবাসায়<br>
      জীবন সবসময় সুন্দর থাকুক। ❤️
    </p>
    <p style="margin-top:18px;font-size:28px">🌸 💖 🎊 🎈</p>
  </div>
</div>

<script>
function hideAll(){
  document.getElementById("cover").classList.remove("active");
  document.getElementById("animation").classList.remove("active");
  document.getElementById("birthday").classList.remove("active");
  document.getElementById("final").classList.remove("active");
}

function openCover(){
  hideAll();
  document.getElementById("animation").classList.add("active");

  setTimeout(function(){
    hideAll();
    document.getElementById("birthday").classList.add("active");
  },2200);
}

function openSurprise(){
  hideAll();
  document.getElementById("final").classList.add("active");
  flowerRain();
  setTimeout(flowerRain,700);
  setTimeout(flowerRain,1400);
}

function flowerRain(){
  var flowers=["🌸","🌹","🎉","🎊","✨","💖","🎈","🌺"];

  for(var i=0;i<80;i++){
    var x=document.createElement("div");
    x.className="confetti";
    x.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];
    x.style.left=Math.random()*100+"vw";
    x.style.fontSize=(16+Math.random()*25)+"px";
    x.style.animationDuration=(3+Math.random()*3)+"s";
    x.style.setProperty("--side",(Math.random()*240-120)+"px");
    document.body.appendChild(x);

    setTimeout(function(a){
      return function(){a.remove();}
    }(x),6500);
  }
}
</script>

</body>
</html>
